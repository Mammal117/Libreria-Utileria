<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <script src="js/utileria.js"></script>

</head>
<body>
    
<div class="contenedor-formulario">
      <h1>Formulario de Registro</h1>
    <form class="">
     
        <label for="nombre">Nombre completo</label>

         <input type="text" id="nombre" name="nombre" placeholder="Eje: Ahuitz Ortiz">
        
        <label for="correo">Correo electronico:</label>

        <input type="text" id="correo" placeholder="Eje: Ahuitz@hotmail.com">

         <label for="telefono">Telefono:</label>

        <input type="text" id="telefono"  placeholder="Eje: 951 243 09 84">

        <label for="numero">Numero favorito:</label>
        <input type="number" id="numero" min="0" step="1" 
    onkeydown="return !['-','+','e','E'].includes(event.key)" 
    placeholder="Eje: 12345">

         <label for="fechaNacimiento">Fecha de Nacimiento:</label>
        <input type="date" id="fechaNacimiento">

         <label for="password">Contraseña:</label>
        <input type="password" id="password" placeholder="Min. 8 caracteres, mayus, minus, numeros, especiales">

        <button type="button" onclick="procesarFormulario()">Registrar</button>

        <input type="text" id="resultadoUsuario" readonly placeholder="Nombre de usuario sugerido">

    <input type="reset" value="Limpiar todo ">
    </form>

<div class="enlace-login">
    <a href="login.html">¿Ya tienes cuenta? Inicia sesion</a>
</div>

 <div class="modal-fondo" id="modalEdad">
        <div class="modal-caja">
            <h2>Registro exitoso</h2>
            <p id="mensajeModal"></p>
            <button type="button" onclick="cerrarModal()">Cerrar</button>
        </div>
    </div>

    </form>
    </div>

</body>
</html>
